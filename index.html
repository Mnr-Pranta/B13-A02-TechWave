<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechWave - Podcast</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="navbar flex-center-between">
         <input type="checkbox" id="menu-toggle" hidden>
        <label for="menu-toggle" class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <div>
            <h2 class="logo-white">Tech<span class="logo-gradient">Wave</span></h2>
        </div>
       
        <div class="navlinks flex-center-between">

     <section class="banner">
